[build]
  publish = "dist"
  command = "npm run build"
[functions]
  directory = "netlify/functions"
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "0"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://alcdn.msauth.net https://login.microsoftonline.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://app.powerbi.com https://login.microsoftonline.com; connect-src 'self' https://login.microsoftonline.com https://*.login.microsoftonline.com https://graph.microsoft.com https://api.powerbi.com https://app.powerbi.com https://*.analysis.windows.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://login.microsoftonline.com"
